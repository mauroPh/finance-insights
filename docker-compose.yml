services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-insights-db
    restart: unless-stopped
    env_file: .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./database/transacoes.csv:/tmp/transacoes.csv:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: finance-insights-pgdata
